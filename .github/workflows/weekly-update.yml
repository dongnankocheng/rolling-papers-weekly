name: Weekly Paper Update

"on":
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  fetch-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch new papers
        run: python scripts/fetch_new_papers.py

      - name: Check for changes
        id: check
        run: |
          if git diff --quiet papers.js; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No new papers found."
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "New papers found!"
            cat _fetch_result.json
          fi

      - name: Commit and push
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add papers.js
          git commit -m "auto: weekly paper update"
          git push

      - name: Summary
        if: always()
        run: |
          echo "### Weekly Update Summary" >> $GITHUB_STEP_SUMMARY
          if [ -f _fetch_result.json ]; then
            cat _fetch_result.json >> $GITHUB_STEP_SUMMARY
          else
            echo "No result file generated." >> $GITHUB_STEP_SUMMARY
          fi